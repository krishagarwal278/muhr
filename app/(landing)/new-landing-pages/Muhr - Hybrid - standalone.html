document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Muhr — Likeness licensing for creators and brands<\u002Ftitle>\n<style>\n@font-face { font-family: 'Switzer'; src: url(\"e2b8e9b4-93ac-4af0-8894-3b50cd3e588d\") format('woff2'); font-weight: 400; font-display: swap; font-style: normal; }\n@font-face { font-family: 'Switzer'; src: url(\"e85fd1ef-f8cc-4a9d-b1b1-ccf2261ee8e0\") format('woff2'); font-weight: 500; font-display: swap; font-style: normal; }\n@font-face { font-family: 'Switzer'; src: url(\"428dd5ea-c228-47f1-ae01-78125f582227\") format('woff2'); font-weight: 600; font-display: swap; font-style: normal; }\n@font-face { font-family: 'Switzer'; src: url(\"189f3c7e-db83-4abd-8c8f-f37157a06143\") format('woff2'); font-weight: 700; font-display: swap; font-style: normal; }\n@font-face { font-family: 'Clash Display'; src: url(\"9fefd791-f192-4b35-8d10-6be641fb948b\") format('woff2'); font-weight: 400; font-display: swap; font-style: normal; }\n@font-face { font-family: 'Clash Display'; src: url(\"c5c48269-21df-4f51-bee3-3c5ca8aca0af\") format('woff2'); font-weight: 500; font-display: swap; font-style: normal; }\n@font-face { font-family: 'Clash Display'; src: url(\"8dd5c5af-c1d0-43aa-8541-9a72dde74160\") format('woff2'); font-weight: 600; font-display: swap; font-style: normal; }\n<\u002Fstyle>\n<style>\n  :root {\n    --bg: #ffffff;\n    --bg-alt: #f4f6f9;\n    --bg-ink: #0c0e15;\n    --ink: #0a0c12;\n    --ink-2: #2a2f3a;\n    --muted: #646b7a;\n    --line: #e7e9ee;\n    --line-2: #d8dbe2;\n    --accent: #1b3cf5;\n    --accent-press: #1631cc;\n    --accent-soft: rgba(27, 60, 245, 0.08);\n    --radius: 14px;\n    --radius-lg: 22px;\n    --maxw: 1200px;\n    --pad-x: clamp(22px, 5vw, 60px);\n    --display: \"Clash Display\", -apple-system, sans-serif;\n    --font: \"Switzer\", -apple-system, BlinkMacSystemFont, sans-serif;\n    --shadow-card: 0 1px 2px rgba(10,12,18,.04), 0 18px 44px rgba(10,12,18,.08);\n    --shadow-float: 0 2px 8px rgba(10,12,18,.07), 0 36px 80px rgba(13,24,80,.16);\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }\n  body { font-family: var(--font); background: var(--bg); color: var(--ink); line-height: 1.5; font-size: 18px; letter-spacing: -0.008em; }\n  img { display: block; max-width: 100%; }\n  a { color: inherit; text-decoration: none; }\n  .wrap { max-width: var(--maxw); margin: 0 auto; padding-left: var(--pad-x); padding-right: var(--pad-x); }\n  .eyebrow { font-family: var(--font); font-size: 13px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }\n  h1, h2, h3, h4 { font-family: var(--display); font-weight: 500; line-height: 1.02; letter-spacing: -0.015em; }\n  .lead { color: var(--ink-2); font-size: clamp(18px, 2vw, 21px); line-height: 1.55; }\n\n  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 9px; font-family: var(--font); font-weight: 600; font-size: 16px; padding: 14px 26px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; white-space: nowrap; transition: transform .18s ease, background-color .18s ease, box-shadow .18s ease, border-color .18s ease; }\n  .btn-primary { background-color: var(--accent); color: #fff; box-shadow: 0 1px 2px rgba(10,12,18,.1), 0 10px 26px rgba(27,60,245,.26); }\n  .btn-primary:hover { background-color: var(--accent-press); transform: translateY(-1px); }\n  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line-2); }\n  .btn-ghost:hover { border-color: var(--ink); transform: translateY(-1px); }\n  .btn-sm { padding: 10px 20px; font-size: 14.5px; }\n\n  /* Nav */\n  header.nav { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,.8); backdrop-filter: saturate(160%) blur(16px); -webkit-backdrop-filter: saturate(160%) blur(16px); border-bottom: 1px so ion: absolute; bottom: -26px; left: -34px; width: min(320px, 80%); background: var(--bg); border-radius: 16px; padding: 18px; box-shadow: var(--shadow-float); border: 1px solid var(--line); }\n  @media (max-width: 520px) { .float-card { left: -6px; bottom: -18px; } }\n  .fc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }\n  .fc-title { font-size: 12.5px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }\n  .fc-badge { font-size: 11.5px; font-weight: 600; color: var(--accent); background: var(--accent-soft); padding: 3px 9px; border-radius: 100px; }\n  .fc-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-top: 1px solid var(--line); }\n  .fc-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg,#dfe4ee,#c2cbdb); flex: none; }\n  .fc-meta { flex: 1; min-width: 0; }\n  .fc-name { font-size: 14px; font-weight: 600; }\n  .fc-sub { font-size: 12px; color: var(--muted); }\n  .fc-amt { font-size: 14.5px; font-weight: 700; font-family: var(--display); }\n  .fc-action { font-size: 11.5px; font-weight: 600; color: #fff; background: var(--accent); padding: 5px 12px; border-radius: 100px; }\n\n  /* bands */\n  section.band { padding: clamp(64px, 9vw, 132px) 0; }\n  .band.alt { background: var(--bg-alt); }\n  .band.ink { background: var(--bg-ink); color: #eef1f6; }\n  .sec-head { max-width: 760px; }\n  .sec-head h2 { font-size: clamp(32px, 4.6vw, 58px); margin-top: 22px; }\n  .sec-head .lead { margin-top: 22px; }\n\n  /* trust line */\n  .trustline { text-align: center; padding: clamp(48px,6vw,76px) 0; }\n  .trustline p { font-family: var(--display); font-size: clamp(24px, 3.4vw, 42px); font-weight: 400; letter-spacing: -0.015em; max-width: 20ch; margin: 0 auto; line-height: 1.12; }\n  .trustline em { font-style: italic; color: var(--accent); }\n\n  /* pillars — editorial hairline list */\n  .pillars { margin-top: 56px; border er-sec\" placeholder=\"Drop a portrait / studio image\" fit=\"cover\" style=\"aspect-ratio:16/11;\"><\u002Fimage-slot>\n    <\u002Fdiv>\n    <div>\n      <span class=\"eyebrow\">Data &amp; security<\u002Fspan>\n      <h2 style=\"font-size:clamp(32px,4.6vw,58px);margin-top:22px;\">Your face and voice never train a model.<\u002Fh2>\n      <p class=\"lead\" style=\"margin-top:22px;\">Photos and audio live in encrypted, access-controlled storage, used only to produce a specific approved video. We never sell your data, and we never use your likeness to train AI.<\u002Fp>\n      <div class=\"badges\">\n        <span class=\"badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg> Encrypted storage<\u002Fspan>\n        <span class=\"badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M18 6 6 18M6 6l12 12\"><\u002Fpath><\u002Fsvg> No model training<\u002Fspan>\n        <span class=\"badge\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 2 4 6v6c0 5 3.5 8 8 10 4.5-2 8-5 8-10V6l-8-4z\"><\u002Fpath><\u002Fsvg> Never sold<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section class=\"band alt\" id=\"faq\">\n  <div class=\"wrap\" style=\"max-width:900px;\">\n    <div class=\"sec-head\" style=\"margin:0 auto;text-align:center;\">\n      <span class=\"eyebrow\">Questions<\u002Fspan>\n      <h2>Frequently asked<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"faq\">\n      <details class=\"qa\" open=\"\"><summary>What is Muhr?<span class=\"plus\"><\u002Fspan><\u002Fsummary><div class=\"ans\">Muhr is a licensing vault and marketplace for your likeness. Brands license your face and voice to create AI-generated video, you approve every use, and you get paid under signed terms. Think of it as stock licensing — for your presence.<\u002Fdiv><\u002Fdetails>\n      <details class=\"qa\"><summary>Do I need a large following?<span class=\"plus\"><\u002Fspan><\u002Fsummary><div class=\"ans\">No. Muhr is built for on-camera talent and creators across a wide range — roughly 5K to 500K followers. Brands want real, relatable people their audiences trust, not only celebrities.<\u002Fdiv><\u002Fdetails>\n      <details class=\"qa\"><summary>Can I decline a deal?<span class=\"plus\"><\u002Fspan><\u002Fsummary><div class=\"ans\">Always. You approve the deal before work begins and the final video before it ships — two checkpoints, every time. Decline at either, with no explanation required.<\u002Fdiv><\u002Fdetails>\n      <details class=\"qa\"><summary>What happens to my data?<span class=\"plus\"><\u002Fspan><\u002Fsummary><div class=\"ans\">Your photos and audio are kept in encrypted, access-controlled storage and used only to produce a specific approved video. We never use your likeness to train AI models, and we never sell your data.<\u002Fdiv><\u002Fdetails>\n      <details class=\"qa\"><summary>Does it cost anything to join?<span class=\"plus\"><\u002Fspan><\u002Fsummary><div class=\"ans\">No. Creating a profile is free. We take a platform fee only when you complete a paid transaction — you never pay to be listed or to receive license requests.<\u002Fdiv><\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FINAL CTA (dark) -->\n<section class=\"cta-band band ink\" id=\"waitlist\">\n  <div class=\"wrap\">\n    <h2>Two sides. One <em>trusted<\u002Fem> license.<\u002Fh2>\n    <p class=\"lead\">Whether you're protecting your likeness or licensing it, Muhr keeps every use consented, contracted, and clear. Choose your path to early access.<\u002Fp>\n    <div class=\"dual\">\n      <div class=\"dcard crt\">\n        <span class=\"deyebrow\">For creators<\u002Fspan>\n        <h3>Vault and license your likeness.<\u002Fh3>\n        <p>Set your rate, approve every use, and earn under signed terms — on your terms.<\u002Fp>\n        <a class=\"btn btn-primary\" href=\"#\">Join as a creator<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"dcard brd\">\n        <span class=\"deyebrow\">For brands<\u002Fspan>\n        <h3>License cleared talent for AI video.<\u002Fh3>\n        <p>Browse verified, consenting creators and license with a clean chain of rights.<\u002Fp>\n        <a class=\"btn btn-light\" href=\"#\">Request brand access<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<footer class=\"ft\">\n  <div class=\"wrap\">\n    <div class=\"ft-top\">\n      <div>\n        <a class=\"brand\" href=\"#top\"><span class=\"mark\">M<\u002Fspan><span>Muhr<\u002Fspan><\u002Fa>\n        <p class=\"ft-tag\">Vault, license, and earn from your likeness — on your terms.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"ft-links\">\n        <div class=\"ft-col\"><h5>Creators<\u002Fh5><a href=\"#creators\">License inbox<\u002Fa><a href=\"#how\">How it works<\u002Fa><a href=\"#waitlist\">Join as creator<\u002Fa><\u002Fdiv>\n        <div class=\"ft-col\"><h5>Brands<\u002Fh5><a href=\"#brands\">Talent library<\u002Fa><a href=\"#legal\">Rights &amp; clearance<\u002Fa><a href=\"#waitlist\">Request access<\u002Fa><\u002Fdiv>\n        <div class=\"ft-col\"><h5>Company<\u002Fh5><a href=\"#\">About<\u002Fa><a href=\"#\">Contact<\u002Fa><a href=\"#\">Sign in<\u002Fa><\u002Fdiv>\n        <div class=\"ft-col\"><h5>Legal<\u002Fh5><a href=\"#\">Privacy<\u002Fa><a href=\"#\">Terms<\u002Fa><a href=\"#\">Cookies<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ft-bottom\"><span>© 2026 Muhr. All rights reserved.<\u002Fspan><span>Built on consent, contracts, and control.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<div class=\"switcher\">\n  <span class=\"sw-label\">Direction<\u002Fspan>\n  <a href=\"Muhr - Signal.html\">Signal<\u002Fa>\n  <a href=\"Muhr
